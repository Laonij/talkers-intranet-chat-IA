<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Intranet Chat</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="center">
  <div class="card">
    <h1>Entrar</h1>
    <p class="muted small">Use seu email e senha. ()</p>

    <label>Email</label>
    <input id="email" placeholder="email" />

    <label>Senha</label>
    <input id="password" type="password" placeholder="senha" />

    <div class="row" style="margin-top:12px;">
      <button class="btn primary" id="btnLogin">Entrar</button>
      <a class="btn" href="/index.html">Ir para o chat</a>
    </div>

    <div class="muted small" id="msg" style="margin-top:10px;"></div>
  </div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

document.getElementById('btnLogin').onclick = async () => {
  const msg = document.getElementById('msg');
  msg.textContent = '';
  try {
    await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      })
    });
    location.href = '/index.html';
  } catch (e) {
    msg.textContent = 'Erro: ' + e.message;
  }
};
</script>
</body>
</html>
