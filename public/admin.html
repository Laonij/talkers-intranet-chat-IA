<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Talkers Chat</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="center">
  <div class="card" style="width:min(980px,100%);">
    <div class="row" style="justify-content:space-between;">
      <h1 style="margin:0;">Admin</h1>
      <a class="btn" href="/index.html">Voltar</a>
    </div>
    <p class="muted small" style="margin-top:6px;">Gerencie usuários e sincronização.</p>

    <h2>Criar usuário</h2>
    <div class="row" style="flex-wrap:wrap;">
      <input id="name" placeholder="Nome" style="flex:1; min-width:160px;" />
      <input id="email" placeholder="Email" style="flex:1; min-width:220px;" />
      <input id="password" placeholder="Senha" type="password" style="flex:1; min-width:160px;" />
      <select id="role" style="width:140px;">
        <option value="user">user</option>
        <option value="admin">admin</option>
      </select>
      <button class="btn primary" id="btnCreate">Criar</button>
    </div>
    <div class="muted small" id="createMsg" style="margin-top:6px;"></div>

    <h2 style="margin-top:22px;">Usuários</h2>
    <div class="muted small" style="margin-bottom:10px;">Dica: você não consegue excluir seu próprio usuário.</div>

    <table class="table" id="usersTable">
      <thead>
        <tr><th>ID</th><th>Nome</th><th>Email</th><th>Role</th><th>Criado</th><th>Ações</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="row" style="margin-top:16px; gap:10px;">
      <button class="btn" id="btnSyncDrive">Sincronizar Drive</button>
      <button class="btn" id="btnReindex">Reindexar</button>
      <span class="muted small" id="syncMsg"></span>
    </div>
  </div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

let me = null;
async function loadMe(){
  const data = await api('/api/me');
  me = data.user;
}

function fmtDate(s){
  try{ return new Date(s).toLocaleString('pt-BR'); }catch{ return s||''; }
}

async function loadUsers(){
  const data = await api('/api/admin/users');
  const tb = document.querySelector('#usersTable tbody');
  tb.innerHTML = '';
  for (const u of data.users){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${u.name||''}</td>
      <td>${u.email||''}</td>
      <td>${u.role||''}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td>
        <div class="actions">
          <button class="btn danger sm" data-del="${u.id}" ${me && String(me.sub)===String(u.id) ? 'disabled' : ''}>Excluir</button>
        </div>
      </td>
    `;
    tb.appendChild(tr);
  }

  tb.querySelectorAll('button[data-del]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-del');
      if (!confirm('Excluir o usuário #' + id + '?')) return;
      try{
        await api('/api/admin/users/' + id, { method:'DELETE' });
        await loadUsers();
      }catch(e){
        alert('Erro: ' + e.message);
      }
    }
  });
}

document.getElementById('btnCreate').onclick = async ()=>{
  const msg = document.getElementById('createMsg');
  msg.textContent = '';
  try{
    await api('/api/admin/users', {
      method:'POST',
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      })
    });
    msg.textContent = 'Usuário criado.';
    document.getElementById('password').value = '';
    await loadUsers();
  }catch(e){
    msg.textContent = 'Erro: ' + e.message;
  }
}

document.getElementById('btnSyncDrive').onclick = async ()=>{
  const el = document.getElementById('syncMsg');
  el.textContent = 'Sincronizando...';
  try{
    await api('/api/admin/sync-drive', { method:'POST' });
    el.textContent = 'OK. (Roda em background no servidor)';
  }catch(e){
    el.textContent = 'Erro: ' + e.message;
  }
}

document.getElementById('btnReindex').onclick = async ()=>{
  const el = document.getElementById('syncMsg');
  el.textContent = 'Reindexando...';
  try{
    await api('/api/admin/reindex', { method:'POST' });
    el.textContent = 'OK. (Roda em background no servidor)';
  }catch(e){
    el.textContent = 'Erro: ' + e.message;
  }
}

(async ()=>{
  await loadMe();
  await loadUsers();
})();
</script>
</body>
</html>
