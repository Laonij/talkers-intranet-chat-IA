<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Talkers</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="page page-app">
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="/logo.png" alt="Talkers" width="28" height="28" />
        <div class="brand-text">
          <div class="brand-title">Admin</div>
          <div class="brand-sub">Gerenciar usuários</div>
        </div>
      </div>

      <a class="btn btn-block" href="/">← Voltar ao chat</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">Usuários</div>
      </header>

      <section class="panel">
        <div class="hint">
          Crie usuários e remova quando necessário. (Dica: não remova seu próprio usuário admin.)
        </div>

        <div class="card">
          <h3 style="margin:0 0 10px 0;">Criar usuário</h3>
          <div class="grid">
            <div>
              <label>Nome</label>
              <input id="name" placeholder="Nome completo" />
            </div>
            <div>
              <label>Email</label>
              <input id="email" placeholder="email@empresa.com" />
            </div>
            <div>
              <label>Senha</label>
              <input id="password" type="password" placeholder="Senha" />
            </div>
            <div>
              <label>Perfil</label>
              <select id="role">
                <option value="user">Usuário</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="row" style="margin-top:12px;">
            <button class="btn btn-primary" id="btnCreate">Criar</button>
            <div class="muted" id="msg"></div>
          </div>
        </div>

        <div class="card" style="margin-top:12px;">
          <h3 style="margin:0 0 10px 0;">Lista</h3>
          <div id="users"></div>
        </div>
      </section>
    </main>
  </div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

async function load(){
  const r = await api('/api/admin/users');
  const wrap = document.getElementById('users');
  wrap.innerHTML = '';
  (r.users||[]).forEach(u=>{
    const row = document.createElement('div');
    row.className='file-row';
    row.innerHTML = `
      <div style="min-width:0">
        <div style="font-weight:800">${escapeHtml(u.name)} <span class="muted" style="font-weight:600">(${escapeHtml(u.role)})</span></div>
        <div class="muted small">${escapeHtml(u.email)} • id ${u.id}</div>
      </div>
      <button class="btn" data-id="${u.id}">Remover</button>
    `;
    row.querySelector('button').onclick = async ()=>{
      if (!confirm('Remover este usuário?')) return;
      try{
        await api('/api/admin/users/' + u.id, { method:'DELETE' });
        await load();
      }catch(e){
        alert('Erro: ' + e.message);
      }
    };
    wrap.appendChild(row);
  });
}

document.getElementById('btnCreate').onclick = async ()=>{
  const msg = document.getElementById('msg');
  msg.textContent = '';
  try{
    await api('/api/admin/users', {
      method:'POST',
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      })
    });
    msg.textContent = 'Usuário criado!';
    document.getElementById('name').value='';
    document.getElementById('email').value='';
    document.getElementById('password').value='';
    await load();
  }catch(e){
    msg.textContent = 'Erro: ' + e.message;
  }
};

load().catch(()=>location.href='/login.html');
</script>

<style>
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
@media(max-width:920px){
  .grid{ grid-template-columns:1fr; }
}
</style>

</body>
</html>
