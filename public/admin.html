<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • The Boss IA</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="center" style="align-items:flex-start;">
    <div class="card" style="width:min(980px, 100%);">
      <div class="row" style="justify-content:space-between; gap:12px; align-items:center;">
        <div style="display:flex; align-items:center; gap:12px;">
          <img class="logo-sm" src="/logo.png" alt="Logo" />
          <div>
            <div style="font-size:18px; font-weight:800;">Admin</div>
            <div class="muted small">Criar e remover usuários</div>
          </div>
        </div>
        <a class="btn" href="/index.html">Voltar</a>
      </div>

      <div style="margin-top:18px; border-top:1px solid var(--border); padding-top:16px;">
        <div style="font-weight:800; margin-bottom:10px;">Criar usuário</div>
        <div class="row">
          <div>
            <label>Nome</label>
            <input id="name" placeholder="Nome" />
          </div>
          <div>
            <label>Email</label>
            <input id="email" placeholder="email@empresa.com" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Senha</label>
            <input id="password" type="password" placeholder="Senha" />
          </div>
          <div>
            <label>Tipo</label>
            <select id="role">
              <option value="user">Usuário</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div style="margin-top:12px; display:flex; justify-content:flex-end; gap:10px;">
          <button class="btn primary" id="btnCreate">Criar</button>
        </div>
        <div id="msg" class="small" style="margin-top:10px;"></div>
      </div>

      <div style="margin-top:18px;">
        <div style="font-weight:800; margin-bottom:10px;">Usuários</div>
        <table class="table" id="usersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Role</th>
              <th style="text-align:right;">Ações</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

function setMsg(text, isError=false){
  const el = document.getElementById('msg');
  el.className = isError ? 'error' : 'muted small';
  el.textContent = text || '';
}

async function loadUsers(){
  const { users } = await api('/api/admin/users');
  const body = document.getElementById('usersBody');
  body.innerHTML = '';
  for (const u of users){
    const tr = document.createElement('tr');

    const tdId = document.createElement('td'); tdId.textContent = u.id;
    const tdName = document.createElement('td'); tdName.textContent = u.name;
    const tdEmail = document.createElement('td'); tdEmail.textContent = u.email;
    const tdRole = document.createElement('td');
    const badge = document.createElement('span');
    badge.className = 'badge ' + (u.role === 'admin' ? 'admin' : '');
    badge.textContent = u.role;
    tdRole.appendChild(badge);

    const tdActions = document.createElement('td');
    tdActions.style.textAlign = 'right';
    const wrap = document.createElement('div');
    wrap.className = 'actions';

    const btnDel = document.createElement('button');
    btnDel.className = 'btn danger';
    btnDel.textContent = 'Remover';
    btnDel.onclick = async () => {
      if (!confirm(`Remover usuário ${u.email}?`)) return;
      try{
        await api('/api/admin/users/' + u.id, { method:'DELETE' });
        setMsg('Usuário removido.');
        await loadUsers();
      }catch(e){
        setMsg('Erro: ' + e.message, true);
      }
    };

    // Safety: don't show delete for main admin
    if (String(u.email).toLowerCase() === 'admin@talkers.com') {
      btnDel.disabled = true;
      btnDel.title = 'Não é possível remover o admin principal';
    }

    wrap.appendChild(btnDel);
    tdActions.appendChild(wrap);

    tr.appendChild(tdId);
    tr.appendChild(tdName);
    tr.appendChild(tdEmail);
    tr.appendChild(tdRole);
    tr.appendChild(tdActions);
    body.appendChild(tr);
  }
}

document.getElementById('btnCreate').onclick = async () => {
  setMsg('');
  try{
    await api('/api/admin/users', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      })
    });
    document.getElementById('password').value = '';
    setMsg('Usuário criado.');
    await loadUsers();
  }catch(e){
    setMsg('Erro: ' + e.message, true);
  }
};

loadUsers().catch(e => setMsg('Erro: ' + e.message, true));
</script>
</body>
</html>
