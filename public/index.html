<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Boss IA</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="logo-sm" src="/logo.png" alt="Logo" />
        <div class="brand-meta">
          <div class="brand-title">The Boss IA</div>
          <div class="brand-sub" id="userSub">—</div>
        </div>
      </div>

      <button class="btn primary" id="btnNewChat"><span>+ Nova conversa</span></button>

      <div class="section conversations-section">
        <div class="section-title">Conversas</div>
        <div class="conversations" id="convList"></div>
      </div>

      <div class="section">
        <div class="section-title">Conta</div>
        <div class="row">
          <a class="btn" href="/admin.html" id="adminBtn" style="display:none;"><span>Admin</span></a>
          <button class="btn danger" id="btnLogout"><span>Sair</span></button>
        </div>
      </div>
    </aside>

    <div class="backdrop" id="sidebarBackdrop"></div>

    <main class="main">
      <div class="topbar">
        <button class="toggle" id="btnToggleSidebar" aria-label="Menu">☰</button>
        <div class="title" id="convTitle">—</div>

        <div class="mode" id="modeWrap" style="display:none;">
          <label>Modo:</label>
          <select id="modeSelect">
            <option value="geral">Geral</option>
            <option value="empresa">Empresa</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <div class="chat" id="chat"></div>

        <div class="files">
          <div class="files-header">
            <div><b>Arquivos da conversa</b></div>
            <form id="uploadForm">
              <input type="file" id="fileInput" name="file" />
              <button class="btn" type="submit">Enviar</button>
            </form>
          </div>
          <div class="files-list" id="filesList"></div>
        </div>

        <div class="composer">
          <div class="composer-left">
            <button class="icon-btn" id="btnAttach" title="Adicionar arquivos" aria-haspopup="true" aria-expanded="false">
              <span aria-hidden="true">📎</span>
            </button>

            <div class="menu" id="attachMenu" role="menu" aria-label="Menu de anexos" hidden>
              <button class="menu-item" id="menuAddFiles" role="menuitem">
                <span class="mi-ico" aria-hidden="true">📎</span>
                <span>Adicionar fotos e arquivos</span>
              </button>
              <button class="menu-item" id="menuKnowledge" role="menuitem">
                <span class="mi-ico" aria-hidden="true">🧠</span>
                <span>Conhecimento da empresa</span>
              </button>
              <div class="menu-sep" role="separator"></div>
              <button class="menu-item" id="menuCreateImage" role="menuitem">
                <span class="mi-ico" aria-hidden="true">🖼️</span>
                <span>Criar imagem</span>
              </button>
              <button class="menu-item" id="menuDeep" role="menuitem">
                <span class="mi-ico" aria-hidden="true">🔎</span>
                <span>Pesquisa aprofundada</span>
              </button>
              <button class="menu-item" id="menuWeb" role="menuitem">
                <span class="mi-ico" aria-hidden="true">🌐</span>
                <span>Busca na web</span>
              </button>
            </div>
          </div>

          <textarea id="msg" placeholder="Escreva sua mensagem... (Enter envia, Shift+Enter quebra linha)\nDica: você pode colar prints (Ctrl+V) aqui."></textarea>
          <button class="btn primary" id="btnSend">Enviar</button>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

<script src="/client.js"></script>
</body>
</html>
