<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat - Talkers</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="page page-app">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="brand-logo" src="/logo.png" alt="Talkers" width="28" height="28" />
        <div class="brand-text">
          <div class="brand-title">Talkers Chat</div>
          <div class="brand-sub" id="userSub">—</div>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btnNewChat">+ Nova conversa</button>

      <div class="section">
        <div class="section-title">Conversas</div>
        <div class="conversations" id="convList"></div>
      </div>

      <div class="section">
        <div class="section-title">Conta</div>
        <div class="row">
          <a class="btn" href="/admin.html" id="adminBtn" style="display:none;">Admin</a>
          <button class="btn btn-ghost" id="btnLogout">Sair</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="btnToggleSidebar" aria-label="Abrir menu">☰</button>
        <div class="title" id="convTitle">—</div>

        <div class="mode" id="modeWrap" style="display:none;">
          <label for="modeSelect">Modo</label>
          <select id="modeSelect">
            <option value="geral">Geral</option>
            <option value="empresa">Empresa</option>
          </select>
        </div>
      </header>

      <section class="panel">
        <div class="hint" id="empresaHint" style="display:none;">
          <b>Empresa</b>: pesquisa na base interna (INDEX_FOLDER) usando SQLite FTS.
        </div>

        <div class="chat" id="chat" aria-live="polite"></div>

        <div class="files">
          <div class="files-header">
            <div class="files-title">Arquivos da conversa</div>
            <form id="uploadForm" class="upload">
              <input type="file" id="fileInput" name="file" />
              <button class="btn" type="submit">Enviar</button>
            </form>
          </div>
          <div class="files-list" id="filesList"></div>
        </div>

        <div class="composer">
          <textarea id="msg" placeholder="Escreva sua mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
          <button class="btn btn-primary" id="btnSend">Enviar</button>
        </div>
      </section>
    </main>
  </div>

<script src="/client.js"></script>
</body>
</html>
