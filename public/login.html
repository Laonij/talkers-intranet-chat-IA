<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar • The Boss IA</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="center">
  <div class="card login-card">
    <div class="login-hero" aria-hidden="true">
      <img class="logo-hero" src="/logo.png" alt="The Boss IA" />
    </div>

    <h1 class="login-title">Entrar</h1>
    <div class="muted login-subtitle">Use seu email e senha.</div>

    <div class="login-form">
      <label>Email</label>
      <input class="input" id="email" placeholder="seuemail@empresa.com" autocomplete="username" />

      <label>Senha</label>
      <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

      <div style="margin-top:16px;">
        <button class="btn primary" id="btnLogin" style="width:100%;">Entrar</button>
      </div>

      <div id="msg" class="small" style="margin-top:12px;"></div>
    </div>
  </div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

document.getElementById('btnLogin').onclick = async () => {
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = 'small';
  try {
    await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      })
    });
    location.href = '/index.html';
  } catch (e) {
    msg.className = 'error';
    msg.textContent = 'Erro: ' + e.message;
  }
};
</script>
</body>
</html>
