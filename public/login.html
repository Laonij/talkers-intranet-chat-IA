<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Talkers</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="page page-auth">
  <main class="auth">
    <div class="auth-card">
      <div class="auth-brand">
        <img class="auth-logo" src="/logo.png" alt="Talkers" width="256" height="256" />
        <div>
          <h1>Entrar</h1>
          <p class="muted">Use seu email e senha.</p>
        </div>
      </div>

      <form id="loginForm" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" autocomplete="username" placeholder="seuemail@empresa.com" />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" />

        <button class="btn btn-primary" id="btnLogin" type="submit">Entrar</button>

        <div class="auth-msg" id="msg" role="status" aria-live="polite"></div>
      </form>
    </div>
  </main>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    ...opts
  });
  const txt = await res.text();
  let json = null;
  try { json = txt ? JSON.parse(txt) : null; } catch {}
  if (!res.ok) throw new Error(json?.error || txt || `HTTP ${res.status}`);
  return json;
}

document.getElementById('loginForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.classList.remove('error','ok');
  try {
    await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      })
    });
    msg.textContent = 'Entrando...';
    msg.classList.add('ok');
    location.href = '/';
  } catch (e) {
    msg.textContent = 'Erro: ' + (e.message || 'falha no login');
    msg.classList.add('error');
  }
});
</script>
</body>
</html>
